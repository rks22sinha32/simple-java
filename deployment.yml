apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-app
  labels:
    app: java-app

spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-app

  template:
    metadata:
      labels:
        app: java-app

    spec:
      containers:
        - name: java-container
          image: rahul9800/rahul:latest
          ports:
            - containerPort: 8080
  ---

apiVersion: v1
kind: Service
metadata:
  name: java-service

spec:
  selector:
    app: java-app
  ports:
    - port: 80
      targetPort: 8080
  type: NodePort

  

